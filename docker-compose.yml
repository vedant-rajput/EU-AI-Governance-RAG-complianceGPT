
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: .
    ports:
      - "7860:7860"  # Gradio
      - "8001:8001"  # FastMCP
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - GRADIO_SERVER_NAME=0.0.0.0
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

volumes:
  qdrant_data:
